<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#E8675A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pomocute">
    <meta name="description" content="A cute Pomodoro timer to boost your focus">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-144.png">
    <link rel="apple-touch-icon" href="icon-144.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Pomocute · Cute Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Decorative floating tomatoes in background -->
<div class="bg-deco" aria-hidden="true">
    <svg class="float-toma t1" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="42" rx="26" ry="24" fill="#F47B6E" opacity="0.5"/>
        <path d="M30 18 C30 8 22 4 18 10" stroke="#7DB87A" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M30 18 C30 6 38 2 42 9" stroke="#7DB87A" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M30 18 C26 10 26 6 30 4" stroke="#5C9B5A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <svg class="float-toma t2" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="42" rx="26" ry="24" fill="#E8675A" opacity="0.4"/>
        <path d="M30 18 C30 8 22 4 18 10" stroke="#6DAA6A" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M30 18 C30 6 38 2 42 9" stroke="#6DAA6A" stroke-width="3" stroke-linecap="round" fill="none"/>
    </svg>
    <svg class="float-toma t3" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="42" rx="26" ry="24" fill="#F4957A" opacity="0.35"/>
        <path d="M30 18 C30 8 22 4 18 10" stroke="#7DB87A" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M30 18 C28 9 32 5 30 4" stroke="#5C9B5A" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
    <svg class="float-toma t4" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="30" cy="42" rx="26" ry="24" fill="#E8675A" opacity="0.3"/>
        <path d="M30 18 C30 8 22 4 18 10" stroke="#7DB87A" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M30 18 C30 6 38 2 42 9" stroke="#7DB87A" stroke-width="3" stroke-linecap="round" fill="none"/>
    </svg>
</div>

<div class="timer-card" id="appRoot">

    <!-- Header with inline SVG tomato -->
    <div class="app-header">
        <svg class="header-tomato" viewBox="0 0 54 62" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="27" cy="40" rx="23" ry="21" fill="#E8675A"/>
            <ellipse cx="27" cy="38" rx="23" ry="21" fill="#F47B6E"/>
            <ellipse cx="20" cy="34" rx="6" ry="9" fill="#F9A99F" opacity="0.4"/>
            <path d="M27 17 C27 7 19 3 15 9" stroke="#5C9B5A" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M27 17 C27 5 35 1 39 8" stroke="#5C9B5A" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M27 17 C23 9 23 5 27 3" stroke="#4A8A48" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- cute face -->
            <circle cx="21" cy="40" r="2" fill="#C44B3F"/>
            <circle cx="33" cy="40" r="2" fill="#C44B3F"/>
            <path d="M22 46 Q27 50 32 46" stroke="#C44B3F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        </svg>
        <h1>pomocute</h1>
        <svg class="header-tomato small" viewBox="0 0 54 62" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="27" cy="40" rx="23" ry="21" fill="#E8675A"/>
            <ellipse cx="27" cy="38" rx="23" ry="21" fill="#F47B6E"/>
            <ellipse cx="20" cy="34" rx="6" ry="9" fill="#F9A99F" opacity="0.4"/>
            <path d="M27 17 C27 7 19 3 15 9" stroke="#5C9B5A" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M27 17 C27 5 35 1 39 8" stroke="#5C9B5A" stroke-width="3" stroke-linecap="round" fill="none"/>
            <circle cx="21" cy="40" r="2" fill="#C44B3F"/>
            <circle cx="33" cy="40" r="2" fill="#C44B3F"/>
            <path d="M22 46 Q27 50 32 46" stroke="#C44B3F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        </svg>
    </div>

    <!-- Mode switcher -->
    <div class="mode-switch">
        <button class="mode-btn active" data-mode="pomodoro">focus</button>
        <button class="mode-btn" data-mode="shortBreak">short break</button>
        <button class="mode-btn" data-mode="longBreak">long break</button>
    </div>

    <!-- Timer circle with SVG ring -->
    <div class="timer-circle-wrap">
        <svg class="ring-svg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
            <circle class="ring-bg" cx="120" cy="120" r="108" />
            <circle class="ring-fill" id="timerRing" cx="120" cy="120" r="108"
                    stroke-dasharray="678.6" stroke-dashoffset="0" />
        </svg>
        <div class="timer-inner">
            <div class="time-display" id="timerDisplay">25:00</div>
            <div class="session-label" id="sessionLabel">time to focus</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn" id="startPauseBtn">
            <svg class="btn-icon" id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
            <svg class="btn-icon hidden" id="pauseIcon" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>
            <span id="btnLabel">start</span>
        </button>
        <button class="ctrl-btn reset-btn" id="resetBtn">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.16 2.34L3 8"/><path d="M3 3v5h5"/></svg>
            <span>reset</span>
        </button>
    </div>

    <!-- Cute message -->
    <div id="cuteMessage" class="cute-message">take a deep breath, you got this!</div>

    <!-- Install hint -->
    <div class="install-hint" id="installHint">save me to your home screen for offline use</div>

    <footer>pomodoro technique · cute edition</footer>
</div>

<script src="script.js"></script>
</body>
</html>
